name: 매일 아침 뉴스 브리핑

on:
  schedule:
    - cron: "0 20 * * *"   # 한국시간 오전 5시
    - cron: "0 8 * * *"   # 한국시간 오후 5시
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: pip install feedparser requests

      - name: 뉴스 수집 & 텔레그램 전송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python news_clipping.py
